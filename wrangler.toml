name = "inijmegen"
main = "src/index.ts"
compatibility_date = "2026-06-17"
workers_dev = false

# Worker met static assets. De code in src/index.ts voegt
# security-headers toe, doet www→apex en zet cache-control per
# pad — voor de rest is het een dunne proxy naar de assets.
[assets]
directory = "."
binding = "ASSETS"
# Clean URLs: /stichting → serveert stichting.html zonder redirect;
# /stichting.html → 308 naar /stichting.
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
# Worker-handler MOET vóór de asset-serving runnen — anders skipt
# Cloudflare onze code voor elke matching static asset en lopen
# security-headers + www-redirect mis.
run_worker_first = true
